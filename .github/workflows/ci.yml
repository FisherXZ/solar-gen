# CI quality gate — runs on every PR and push to main
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: lint + format + test ──────────────────────────────
  python-quality:
    runs-on: ubuntu-latest
    env:
      # Dummy values so tests don't fail on missing env
      SUPABASE_URL: "https://test.supabase.co"
      SUPABASE_SERVICE_KEY: "test-service-key"
      ANTHROPIC_API_KEY: "sk-ant-test-key"
      TAVILY_API_KEY: "tvly-test-key"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "agent/pyproject.toml"

      - run: pip install -e "agent/[dev]"

      - name: Ruff lint
        run: ruff check agent/

      - name: Ruff format check
        run: ruff format --check agent/

      - name: Pytest with coverage
        run: pytest agent/tests/ --cov=agent/src --cov-report=term-missing --tb=short

  # ── Frontend: lint + build ────────────────────────────────────
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true  # pre-existing React 19 strict-mode warnings

      - name: Build
        run: npm run build

  # ── Gate: single required status check ────────────────────────
  ci-gate:
    runs-on: ubuntu-latest
    needs: [python-quality, frontend-quality]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.python-quality.result }}" != "success" ] || \
             [ "${{ needs.frontend-quality.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
